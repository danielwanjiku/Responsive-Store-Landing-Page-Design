<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="assets/css/style.css" />
    <title>STOREIFY</title>
  </head>
  <body>
    <header>
      <div class="logo">
        <h1>STOREIFY</h1>
      </div>
      <nav class="navbar" id="navbar">
        <a href="#" class="close">✕</a>
        <a href="#">Home</a>
        <a href="#">Products</a>
        <a href="#">Contact</a>
      </nav>
      <a href="#navbar" id="hamburger">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 24 24"
          stroke-width="1.5"
          stroke="currentColor"
          class="size-6"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5"
          />
        </svg>
      </a>
    </header>
    <section class="products-section">
      <h2>Our Products</h2>
      <div class="product-list">
        <div class="product-item">
          <img src="assets/images/camera.jpg" alt="Camera" />
          <div class="product-info">
            <h3>Camera</h3>
            <p>KSH 5000</p>
          </div>
          <div class="shop-now">
            <p>SHOP NOW</p>
          </div>
        </div>
        <div class="product-item">
          <img src="assets/images/headphones.jpg" alt="Headphones" />
          <div class="product-info">
            <h3>Headphones</h3>
            <p>KSH 2500</p>
          </div>
          <div class="shop-now">
            <p>SHOP NOW</p>
          </div>
        </div>
        <div class="product-item">
          <img src="assets/images/sneakers.jpg" alt="Sneakers" />
          <div class="product-info">
            <h3>Sneakers</h3>
            <p>KSH 2,999</p>
          </div>
          <div class="shop-now">
            <p>SHOP NOW</p>
          </div>
        </div>
        <div class="product-item">
          <img src="assets/images/watch.jpg" alt="Watch" />
          <div class="product-info">
            <h3>Watch</h3>
            <p>KSH 4,999</p>
          </div>
          <div class="shop-now">
            <p>SHOP NOW</p>
          </div>
        </div>
      </div>
    </section>
    <footer>
      <p>&copy; 2024 STOREIFY. All rights reserved.</p>
    </footer>
  </body>
</html>
